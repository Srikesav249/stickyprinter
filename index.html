<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sticky Note Printer</title>
<style>
  body { font-family: Arial, sans-serif }
  body { background: #f0f0f0 }
  body { padding: 20px }
  body { display: flex }
  body { gap: 20px }

  .controls { width: 250px }
  .controls { background: white }
  .controls { padding: 20px }
  .controls { border: 1px solid #ccc }
  .controls { height: fit-content }

  .divider { margin: 20px 0 }
  .divider { border-top: 1px solid #ccc }
  .divider { padding-top: 10px }

  .label { display: block }
  .label { margin-bottom: 5px }

  .mb-10 { margin-bottom: 10px }
  .hidden { display: none !important; }

  .btn { width: 100% }
  .btn { padding: 10px }
  .btn { margin-bottom: 10px }
  .btn { background: #0056b3 }
  .btn { color: white }
  .btn { border: none }
  .btn { cursor: pointer }
  .btn:hover { background: #004494 }

  .font-controls { display: flex }
  .font-controls { gap: 10px }
  .font-controls { margin-bottom: 10px }
  .font-controls { align-items: center }
  
  .btn-small { flex: 1 }
  .btn-small { padding: 10px }
  .btn-small { background: #0056b3 }
  .btn-small { color: white }
  .btn-small { border: none }
  .btn-small { cursor: pointer }
  .btn-small:hover { background: #004494 }
  
  .input-number-small { width: 60px; padding: 10px; box-sizing: border-box; }

  .page { width: 210mm }
  .page { height: 297mm }
  .page { background: white }
  .page { display: grid }
  .page { grid-template-columns: 1fr 1fr }
  .page { grid-template-rows: 1fr 1fr 1fr }
  .page { padding: 20mm }
  .page { gap: 10mm }
  .page { box-sizing: border-box }
  .page { box-shadow: 0 0 10px rgba(0,0,0,0.5) }

  .slot { width: 76mm; height: 76mm; box-sizing: border-box; padding: 5mm; position: relative; }
  .show-guide { border: 2px dashed #000 }
  .active-slot { background-color: #e6f2ff }

  .slot-interior { width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; /* Added overflow: hidden to contain and truncate content */ }

  .note-image { display: none; object-fit: contain; align-self: center; /* Default initial alignment */ margin-bottom: auto; /* Push image to top and take up remaining space */ flex-shrink: 0; max-height: calc(100% - 80px); /* rough estimate to keep text space */ }

  .editable-text { width: 100%; outline: none; margin-top: 10px; font-size: 16px; text-align: center; overflow: hidden; /* Prevent text growth beyond box and truncate visually */ flex: 1; /* grow to fill */ }

  .editable-text:empty:before { content: attr(data-placeholder) }
  .editable-text:empty:before { color: #888 }

  @media print {
    body { background: white; padding: 0; margin: 0; }
    .controls { display: none }
    .page { box-shadow: none; padding: 20mm; }
    .active-slot { background-color: transparent }
    .show-guide { border: none !important; }
    @page { margin: 0; size: A4; }
  }
</style>
</head>
<body>

<div class="controls no-print">
  <button class="btn" onclick="printGuide()">1. Print Guide</button>
  
  <div class="divider">
    <label class="label">Text Options (Select Note first)</label>
    <div class="font-controls mb-10">
      <button class="btn-small" onclick="formatText('bold')">B</button>
      <button class="btn-small" onclick="formatText('italic')">I</button>
    </div>
    <div class="font-controls mb-10">
      <span class="label" style="margin:0;">Font Size:</span>
      <button class="btn-small" onclick="changeFontSize(2)">+</button>
      <button class="btn-small" onclick="changeFontSize(-2)">-</button>
    </div>
  </div>
  
  <div class="divider">
    <label class="label">Image Actions (Select Note first)</label>
    <input type="file" accept="image/png, image/jpeg, image/webp" onchange="uploadImage(event)" class="mb-10">
    
    <div id="image-adjustments-panel" class="image-adjustments-panel hidden mb-10">
        <label class="label">Adjust Active Image</label>
        <div class="font-controls mb-10">
            <span class="label" style="margin:0;">Width (%):</span>
            <input type="number" id="img-scale-input" value="50" min="10" max="100" step="5" oninput="adjustActiveImageScale(this.value)" class="input-number-small">
        </div>
        <div class="font-controls">
            <span class="label" style="margin:0;">H-Position:</span>
            <button class="btn-small" onclick="adjustActiveImagePosition('flex-start')">L</button>
            <button class="btn-small" onclick="adjustActiveImagePosition('center')">C</button>
            <button class="btn-small" onclick="adjustActiveImagePosition('flex-end')">R</button>
        </div>
    </div>
  </div>

  <button class="btn" onclick="printNotes()">2. Print Notes</button>
</div>

<div class="page" id="page-grid">
</div>

<script>
  const pageGrid = document.getElementById('page-grid')
  let activeSlotIndex = null
  let i = 0

  while (i < 6) {
    let currentIndex = i
    const slot = document.createElement('div')
    slot.className = 'slot show-guide'
    slot.onclick = () => selectSlot(currentIndex)
    
    // Wrap the image and text in an interior div with overflow: hidden
    slot.innerHTML = `
        <div class="slot-interior">
            <img class="note-image" id="img-${currentIndex}" src="" alt="">
            <div class="editable-text" contenteditable="true" data-placeholder="Type here..."></div>
        </div>
    `
    pageGrid.appendChild(slot)
    i++
  }

  function selectSlot(index) {
    activeSlotIndex = index
    const slots = document.querySelectorAll('.slot')
    slots.forEach(slot => slot.classList.remove('active-slot'))
    slots[index].classList.add('active-slot')
    
    // Show adjustments panel if an image exists
    const img = document.getElementById('img-' + index)
    const panel = document.getElementById('image-adjustments-panel')
    const imgScaleInput = document.getElementById('img-scale-input')
    if (img && img.style.display !== 'none') {
        panel.classList.remove('hidden')
        imgScaleInput.value = parseInt(img.style.width || '50')
    } else {
        panel.classList.add('hidden')
    }
  }

  function formatText(command) {
    if (activeSlotIndex === null) {
      alert('Please click on a sticky note first')
      return
    }
    const activeText = document.querySelectorAll('.slot')[activeSlotIndex].querySelector('.editable-text')
    activeText.focus()
    document.execCommand(command)
  }

  function changeFontSize(change) {
    if (activeSlotIndex === null) {
      alert('Please click on a sticky note first')
      return
    }
    const activeText = document.querySelectorAll('.slot')[activeSlotIndex].querySelector('.editable-text')
    const currentSize = window.getComputedStyle(activeText).fontSize
    const newSize = parseFloat(currentSize) + change
    activeText.style.fontSize = newSize + 'px'
  }

  function uploadImage(event) {
    if (activeSlotIndex === null) { alert('Please click on a sticky note first'); return; }
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = document.getElementById('img-' + activeSlotIndex);
            img.src = e.target.result;
            img.style.display = 'block';
            
            // Set initial scale and position style explicitly on the element
            img.style.width = '50%';
            img.style.alignSelf = 'center';

            // Show and update adjustments panel
            selectSlot(activeSlotIndex)
        }
        reader.readAsDataURL(file);
    }
  }

  function adjustActiveImageScale(value) {
    if (activeSlotIndex === null) return;
    const img = document.getElementById('img-' + activeSlotIndex);
    if (img) {
        img.style.width = value + '%';
    }
  }

  function adjustActiveImagePosition(align) {
    if (activeSlotIndex === null) return;
    const img = document.getElementById('img-' + activeSlotIndex);
    if (img) {
        img.style.alignSelf = align;
    }
  }

  function printGuide() {
    const slots = document.querySelectorAll('.slot')
    slots.forEach(slot => slot.style.border = '2px dashed #000')
    window.print()
  }

  function printNotes() {
    const slots = document.querySelectorAll('.slot')
    slots.forEach(slot => {
      slot.style.border = 'none'
      slot.classList.remove('active-slot')
    })
    window.print()
    setTimeout(() => {
      slots.forEach(slot => slot.style.border = '2px dashed #000')
      if (activeSlotIndex !== null) {
        slots[activeSlotIndex].classList.add('active-slot')
      }
    }, 1000)
  }
</script>

</body>
</html>
